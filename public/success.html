<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Bienvenido a Premium! — Bellum Mundi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&family=Crimson+Pro:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0806; color:#F9F5ED; font-family:'Crimson Pro',serif;
         min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { text-align:center; max-width:500px; padding:3rem 2rem; }
  .icon { font-size:4rem; margin-bottom:1.5rem; animation:pop 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
  .eyebrow { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.4em;
             color:#C9A84C; text-transform:uppercase; margin-bottom:0.8rem; }
  h1 { font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:700;
       color:#F9F5ED; margin-bottom:1rem; line-height:1.1; }
  p { font-family:'Crimson Pro',serif; font-style:italic; color:#9B9590;
      font-size:1.1rem; margin-bottom:2rem; line-height:1.6; }
  .features { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:2.5rem; text-align:left; }
  .feat { background:#1A1814; border:1px solid rgba(201,168,76,0.2); border-left:3px solid #C9A84C;
          padding:0.8rem 1rem; font-family:'Cinzel',serif; font-size:0.65rem;
          letter-spacing:0.1em; color:#C9A84C; text-transform:uppercase; }
  .btn { display:inline-block; background:#C9A84C; color:#0A0806; font-family:'Cinzel',serif;
         font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; font-weight:700;
         padding:1rem 2.5rem; text-decoration:none; transition:all 0.3s; }
  .btn:hover { background:#E8C97A; transform:translateY(-2px); }
  .rule { width:80px; height:2px; background:#C9A84C; margin:2rem auto; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">⚔️</div>
  <div class="eyebrow">Pago confirmado · Plan Commander activo</div>
  <h1>Bienvenido al Estado Mayor</h1>
  <p>Tu acceso ilimitado a la historia militar más completa en español ya está activo.</p>
  <div class="features">
    <div class="feat">✓ Consultas IA ilimitadas</div>
    <div class="feat">✓ 8.000+ batallas</div>
    <div class="feat">✓ Sin publicidad</div>
    <div class="feat">✓ Newsletter semanal</div>
  </div>
  <div class="rule"></div>
  <a class="btn" href="/">Entrar a Bellum Mundi →</a>
</div>
<script>
  // Limpiar params de URL de Stripe
  if (window.history.replaceState) {
    window.history.replaceState({}, document.title, '/success');
  }
</script>
</body>
</html>
